services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: harmony
      POSTGRES_DB: hotel_harmony
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    env_file:
      - ../../.env.example
    environment:
      DATABASE_URL: postgres://hotel:harmony@postgres:5432/hotel_harmony?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      HTTP_PORT: 8787
    ports:
      - "8787:8787"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
