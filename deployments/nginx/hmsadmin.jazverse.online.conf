# /etc/nginx/sites-available/hmsadmin.jazverse.online
# HMS v2 — Admin/Staff portal (TanStack Start static build) + Go API proxy
#
# Deploy: cp this file to /etc/nginx/sites-available/hmsadmin.jazverse.online
#         ln -sf /etc/nginx/sites-available/hmsadmin.jazverse.online /etc/nginx/sites-enabled/
#         nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name hmsadmin.jazverse.online hmsmasteradmin.jazverse.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hmsadmin.jazverse.online;

    ssl_certificate     /etc/letsencrypt/live/hmsadmin.jazverse.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hmsadmin.jazverse.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/hmsadmin.jazverse.online;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options  nosniff              always;
    add_header X-Frame-Options         SAMEORIGIN           always;
    add_header X-XSS-Protection        "1; mode=block"      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/html text/css text/plain application/javascript
                    application/json application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Go API proxy (Docker container on 127.0.0.1:8787) ────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Admin portal SSR (Nitro node-server on 127.0.0.1:3001) ───────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

server {
    listen 443 ssl http2;
    server_name hmsmasteradmin.jazverse.online;

    ssl_certificate     /etc/letsencrypt/live/hmsadmin.jazverse.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hmsadmin.jazverse.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/hmsadmin.jazverse.online;
    index index.html;

    add_header X-Content-Type-Options  nosniff   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
